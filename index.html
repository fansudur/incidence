<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>∅ | UN</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #07090d; }
  canvas { touch-action: none; display: block; } /* 手势全交给 OrbitControls/拖拽, 不让浏览器抢去滚动/缩放 */
  #info { /* 左上角项目标识: 符号 + 名字, 仅此而已(几何本身承载意义, 不需要文字解说) */
    position: fixed; left: 14px; top: 12px; z-index: 10;
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    text-shadow: 0 1px 2px #000; pointer-events: none; user-select: none;
  }
  #mark { font-size: 17px; letter-spacing: 0.18em; color: #e6eef8; }
  #markName { font-size: 11px; letter-spacing: 0.3em; color: #7f8a99; margin-top: 2px; }
  #warn {
    position: fixed; left: 12px; bottom: 12px; z-index: 10;
    font: 13px/1.5 -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    color: #ff5ad0; text-shadow: 0 1px 2px #000; pointer-events: none; display: none; max-width: 60%;
  }
  /* 移动端: 侧边栏由 JS 默认收起; 标识两行不挡画面, 各端均显示 */
  @media (max-width: 820px) {            /* 窄屏: 面板限宽可滚动 + 控件加大便于触摸 */
    .lil-gui.root { --width: 84vw; max-width: 320px; max-height: 88vh; }
    .lil-gui { --widget-height: 26px; --font-size: 12px; --input-font-size: 12px; }
    #mark { font-size: 15px; } #markName { font-size: 10px; }
  }
</style>
</head>
<body>
<div id="info">
  <div id="mark">∅ | UN</div>
  <div id="markName">Incidence</div>
</div>
<div id="warn"></div>

<script type="importmap">
{
  "imports": {
    "three": "./vendor/three.module.js",
    "three/addons/": "./vendor/addons/",
    "three/examples/jsm/": "./vendor/addons/",
    "three-mesh-bvh": "./vendor/three-mesh-bvh.module.js",
    "three-gpu-pathtracer": "./vendor/three-gpu-pathtracer.module.js",
    "lil-gui": "./vendor/lil-gui.esm.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { PARAM_SCHEMA, defaultParams } from './src/app/params.js';
import { buildGui } from './src/app/gui.js';
import { createScene } from './src/render/scene.js';
import { buildAllWorlds } from './src/render/worldView.js';
import { U } from './src/core/frustum.js';               // 原始单位→渲染单位 (别再硬编码 100)
import { loopPoint } from './src/core/terrain.js';       // 行走环线采样(安全区内, 脚贴地形)
import { createMultiview } from './src/render/multiview.js'; // 三视口子系统(相机/控制器/路由/分隔条/渲染 自持)
import { createEditorDrag } from './src/render/editorDrag.js'; // 编辑·拖拽子系统(坐标轴手柄+自由拖, 全视口拾取)
import { createPTScheduler } from './src/render/ptScheduler.js'; // 路径追踪调度器(BVH 重建/渲染分支/动态行走帧)
import { setupPresets } from './src/app/presets.js';     // 预设存档/载入(JSON 文件进出, 不用浏览器存储)

/* ============================================================================
   镜面反射装置 — 视锥追迹 · 真实尺度 (来源: Grasshopper 3-9.gh, 变体3)
   尺寸用 .gh 原始单位; 内部除以 U=100 保持渲染坐标舒适 (纯比例缩放, 形状不变)。
   ★ 滑块→尺寸的映射是【推断】, 以几何对错为准; 当前默认值见 src/app/params.js (单一数据源, 此处不再抄数字)。

   架构(系统架构文档): CORE(src/core 纯数学·零 three) / RENDER(src/render·three) / APP(src/app schema→GUI)。
   本文件 = 装配入口: 建场景 → 建世界 → GUI → 主循环。改几何去 core/, 改外观去 render/。
   ============================================================================ */

const params = defaultParams(); // 初始参数(默认值)由 src/app/params.js 的 schema 生成
// 移动端轻量回退: 路径追踪太吃手机 GPU(浮点纹理/带宽) → 默认改光栅 + 实时平面反射(Reflector); PT 留作高端机手动开。
// 桌面端不受影响, 仍是作者固化的 PT 开场版。
const isMobile = matchMedia('(max-width: 820px)').matches || (matchMedia('(pointer: coarse)').matches && innerWidth < 1024);
if (isMobile) { params.pathTrace = false; params.realMirror = true; }

let currentView = '透视';                                        // 单视口的当前视图预设
const viewState = { lift: 4, multi: false, splitX: 0.62, splitY: 0.5, eyeFovScale: 1.0 }; // 模型升高 / 三视口 / 分隔比例 / Σ眼视野放宽(1=竖直正好等于F, >1=看到框外观影墙)

const { renderer, scene, controls, persp, ortho, eyeCam, getCamera, useCamera, updateEnv } = createScene(params); // 透视+正交+Σ眼 三相机 + 天空/太阳 → src/render/scene.js
const mv = createMultiview({ // 三视口 → src/render/multiview.js (回调都在使用时才求值)
  renderer, scene, controls, viewState,
  getWorldGroup: () => worldGroup,
  getMainCamera: () => getCamera(),                // 主视口=当前视图相机(Σ眼/透视/正交均可) — Σ位也能开三视口
  onExited: () => {
    multiCtrl.updateDisplay();
    pt.updateCameraIfReady(); // 回全屏 → 重拍投影快照
  },
});

// ---- 重建状态 + 编辑·拖拽 + 路径追踪 (实现在 src/render/{editorDrag,ptScheduler}.js, 此处只装配) ----
const warnEl = document.querySelector('#warn');
let worldGroup = null, framed = false;
let figureFixedFoot = null, lastFoot = null; // 结构性穿越: 固定模式钉住的脚点 / 最近一次计算的脚点(开启瞬间捕获)
const placed = {}; // 拖拽编辑存档: dragId → {x,y,z} (root 局部坐标); 重建后由 worldView 重新套用
let walkHandles = [];        // 行走句柄 [{gap,obj,meta,t,last}] — 每层一人各走各的环线
const walkPhase = {};        // gap → 环线参数 t (跨 rebuild 保持, 行走不因重建跳相位)
const walkYaw = {};          // gap → 行走朝向 yaw (跨 rebuild 保持, 停走重建后不回弹到默认朝向)

const editor = createEditorDrag({ // 坐标轴手柄+自由体拖拽; pt 经闭包延迟取值(两子系统互相引用)
  scene, domElement: renderer.domElement, camera: persp, controls, params, viewState, mv, placed,
  getCamera, getWorldGroup: () => worldGroup,
  schedulePT: () => pt.schedule(), invalidatePT: () => pt.invalidate(),
});
const pt = createPTScheduler({ renderer, scene, params, getCamera, getHidden: () => [editor.gizmo] }); // 手柄不进 BVH
controls.addEventListener('change', () => pt.onCameraMoved()); // 相机真动了才重置累积(不每帧重置)
function rebuild() {
  if (worldGroup) {
    editor.detach();                             // 旧对象即将销毁; 重建后凭选中标识重新吸附
    scene.remove(worldGroup);
    worldGroup.traverse(o => { o.geometry?.dispose?.(); if (o.material) (Array.isArray(o.material) ? o.material : [o.material]).forEach(m => m.dispose()); });
  }
  const { group, bugLayer, foot, figures } = buildAllWorlds(params, { fixedFoot: figureFixedFoot, placed }); // 视锥追迹建世界 → src/render/worldView.js
  if (foot) lastFoot = foot;
  walkHandles = (figures || []).map(f => {              // 相位+朝向跨重建保持(初相错开免三人同步)
    const yaw = walkYaw[f.gap];
    if (yaw !== undefined) f.obj.userData.setHeading?.(yaw); // 复原行走朝向: 否则停走重建后人转回默认朝向(+Z)
    return { ...f, t: walkPhase[f.gap] ?? (f.gap * 0.37) % 1, yaw, last: null };
  });
  worldGroup = group;
  editor.reattach(worldGroup);
  worldGroup.position.y = viewState.lift; // 抬高整体模型, 脱离地面网格
  scene.add(worldGroup);
  const msgs = [];
  if (bugLayer) msgs.push(`第 ${bugLayer} 层穿帮（角光线越过镜面边界 → 光路丢失）`);
  warnEl.style.display = msgs.length ? 'block' : 'none';
  warnEl.textContent = msgs.length ? '⚠ ' + msgs.join('；') : '';
  if (!framed) { setView(currentView); framed = true; }
  if (viewState.multi) mv.frameViewports();
  updateSeedVisibility();
  pt.schedule(); // 几何变了 → (微任务合并后)重建路径追踪 BVH; PT 关闭时内部置 ready=false
}
// 视图预设: 透视(perspective) / 轴测·正视·顶视·侧视(正交 orthographic)。按模型包围盒取景。
// 关系规则(作者定): 三视口的主视口=「当前视图」— 预设按钮在三视口下照常生效(切的是主视口),
// 副视口(顶/正)始终光栅实时, 不再互斥关闭。
function setView(name) {
  if (!worldGroup) return;
  if (name === 'Σ眼') { // 观者所见: eyeCam 在 Σ、透过取景框 F 朝 M₁ (fov 由 F 张角定)
    currentView = name;
    useCamera(eyeCam); placeEyeCam();           // 先切好相机再触发任何 PT 请求(微任务保证拿到最终相机)
    const visChanged = updateSeedVisibility();
    if (suppressScaffold()) rebuild();           // 关黄红脚手架 → rebuild 内部重建 PT
    else pt.viewChanged(visChanged);             // Σ球/标注可见性变了=内容变了→重建 BVH; 否则纯换相机零开销
    return;
  }
  const box = new THREE.Box3().setFromObject(worldGroup);
  if (box.isEmpty()) return;
  const sph = box.getBoundingSphere(new THREE.Sphere());
  const c = sph.center, R = sph.radius || 1;
  const P = {
    透视: { cam: persp, dir: [0.55, 0.5, 1], up: [0, 1, 0] },
    轴测: { cam: ortho, dir: [1, 0.8, 1], up: [0, 1, 0] },
    正视: { cam: ortho, dir: [0, 0, 1], up: [0, 1, 0] },     // 沿 −Z 看(正面)
    顶视: { cam: ortho, dir: [0, 1, 0.001], up: [0, 0, -1] }, // 俯视
    侧视: { cam: ortho, dir: [1, 0, 0], up: [0, 1, 0] },      // 沿 −X 看(侧面)
  }[name];
  if (!P) return;
  currentView = name;
  const cam = P.cam, dir = new THREE.Vector3(...P.dir).normalize();
  cam.up.set(...P.up);
  if (cam.isOrthographicCamera) {
    const a = innerWidth / innerHeight, m = R * 1.15;
    cam.left = -m * a; cam.right = m * a; cam.top = m; cam.bottom = -m;
    cam.near = 0.01; cam.far = R * 40;
    cam.position.copy(c).add(dir.multiplyScalar(R * 8));
  } else {
    const dist = (R / Math.sin(cam.fov * Math.PI / 360)) * 1.25;
    cam.position.copy(c).add(dir.multiplyScalar(dist));
    cam.near = Math.max(dist / 2000, 0.01); cam.far = dist * 2000;
  }
  cam.lookAt(c); cam.updateProjectionMatrix();
  useCamera(cam);
  controls.target.copy(c); controls.update();
  const visChanged = updateSeedVisibility();
  pt.viewChanged(visChanged);                    // 离开/进入Σ眼会改 Σ球/标注可见性 → 重建; 否则纯换相机
}
// Σ 摆位(视点/视野/目标): setView('Σ眼')、「模型升高」滑块、「Σ眼视野放宽」滑块 共用 — 模型动了眼睛必须跟
function placeEyeCam() {
  const lift = viewState.lift, fd = params.fDist / U;
  eyeCam.fov = THREE.MathUtils.radToDeg(2 * Math.atan((params.frameH / 2) / params.fDist)) * viewState.eyeFovScale; // 1=竖直正好等于F; >1=看到框外暗墙; 水平随窗口宽高比 overscan
  eyeCam.position.set(0, lift, 0); eyeCam.up.set(0, 1, 0); eyeCam.lookAt(fd, lift, 0);
  eyeCam.updateProjectionMatrix();
  controls.target.set(fd, lift, 0); controls.update();
}
// Σ 观影位: 隐藏破坏沉浸的东西 —— 原始球体 + 所有文字标注(sprite 永远画最上层会穿墙); 返回是否真有翻转(=场景内容变化, PT 须重建)
function updateSeedVisibility() {
  if (!worldGroup) return false;
  const cinema = currentView === 'Σ眼';
  let changed = false;
  worldGroup.traverse(o => {
    if (o.name === 'seedSphere' || o.isSprite) { if (o.visible === cinema) { o.visible = !cinema; changed = true; } }
  });
  return changed;
}

rebuild();

// ---- GUI (从 src/app/params.js 的 schema 自动生成, 不再手写每个 gui.add) ----
const { gui, ctrls } = buildGui(params, PARAM_SCHEMA, rebuild);
const expandCtrl = ctrls.expand; // 动画循环里要 updateDisplay
if (isMobile) gui.close(); // 移动端: 侧边栏默认收起(点标题栏可展开/收起)

// 路径追踪精度: 改这几项不必整场重建(分辨率/反弹实时改, 采样上限主循环直接读), 只重置累积续渲染 → 拖动即时生效
for (const k of ['ptScale', 'ptBounces', 'ptSamples']) ctrls[k]?.onChange(() => pt.applyOpts());

// 进入"成像/观影"模式(反射 / 路径追踪 / Σ观影位) → 自动关黄(安全区)红(穿帮区)调试脚手架
// 它们是布景调试用的, 看反射成像/影院画面时碍事; 关掉后用户仍可手动再勾选回来
function suppressScaffold() {
  let changed = false;
  if (params.showUsable) { params.showUsable = false; ctrls.showUsable?.updateDisplay(); changed = true; }
  if (params.showBug) { params.showBug = false; ctrls.showBug?.updateDisplay(); changed = true; }
  return changed;
}
ctrls.realMirror?.onChange(v => { if (v) suppressScaffold(); rebuild(); }); // 开真实反射 → 关脚手架
// (路径追踪开关的处理器在「三视口互斥」段注册 — lil-gui onChange 是单处理器替换语义, 这里不要重复注册)

// autoPlay × PT 互斥: 自动展开每帧 rebuild, 若 PT 开着 = 每帧全量 BVH 重建 → 主线程冻死(审查实测)
ctrls.autoPlay?.onChange(v => {
  if (v && params.pathTrace) { params.pathTrace = false; ctrls.pathTrace?.updateDisplay(); pt.invalidate(); }
  rebuild();
});

// 环境(天空/太阳)实时调: 只更新太阳方向/强度 + 天空两色, 不重建几何; PT 侧重算光照与环境后续渲
function applyEnv() {
  updateEnv(params);
  pt.refreshEnv();
}
for (const k of ['sunAz', 'sunEl', 'sunIntensity', 'skyTop', 'skyHorizon', 'skyEnv']) ctrls[k]?.onChange(applyEnv); // 全局天空/太阳: 不动几何
// 分区太阳开关: 关全局方向光(applyEnv 内据 zoneSun 置 0) + 重建生成/移除各黄区聚光灯
// (每层 az/el/强度 与 dist/spread/soft 走 schema 默认 onChange=rebuild, 改即重摆聚光灯)
ctrls.zoneSun?.onChange(() => { applyEnv(); rebuild(); });

// 结构性穿越(作者想法, 见《项目档案》开放方向5): 开启=把人钉在当前位置(世界坐标), 关闭=恢复跟随安全区。
// 钉住后拖 镜距/取景框 让分层扫过他 → Σ 看到 单见→重影(红区)→换层, 人全程未动。
ctrls.figureFixed?.onChange(v => {
  if (v && !lastFoot) { params.figureFixed = false; ctrls.figureFixed.updateDisplay(); return; } // 无脚点可钉(人物隐藏/穿帮中) → 回弹复选框, 不静默假开
  figureFixedFoot = v ? lastFoot.clone() : null;
  rebuild();
});

// 人物行走 × PT 的关系(作者设计):
//  ptDynamic 开 → 共存: 走动=低分辨率每帧1采样(活的噪点画面, 真反射含深层运动); 停走=恢复全分辨率累积"凝固"
//  ptDynamic 关 → 互斥(老规则): 运动让渐进采样无法收敛 → 走动自动退 PT
// 与"固定坐标"恒互斥(走即非钉); 停走时把最后落点写入 placed → 人留在原地不回锚点
ctrls.figureWalk?.onChange(v => {
  if (v) {
    if (params.pathTrace && !params.ptDynamic) { params.pathTrace = false; ctrls.pathTrace?.updateDisplay(); pt.invalidate(); }
    if (params.figureFixed) { params.figureFixed = false; ctrls.figureFixed?.updateDisplay(); figureFixedFoot = null; }
    for (const h of walkHandles) delete placed['figure-' + h.gap]; // 行走接管全部人物位置
  } else {
    for (const h of walkHandles) if (h.last) placed['figure-' + h.gap] = { ...h.last }; // 各自停在原地
    pt.freezeWalk(); // 定格: 恢复全分辨率与库默认节奏(500ms 渐显正好是"凝固感") → rebuild 后累积
  }
  rebuild();
});

// ---- 视图栏 (相机预设可随时点击切换 + 模型升高) — 表现层, 不属模型参数 schema --
const vf = gui.addFolder('视图');
const viewBtns = { '透视图': () => setView('透视'), '轴测图': () => setView('轴测'), '正视图': () => setView('正视'), '顶视图': () => setView('顶视'), '侧视图': () => setView('侧视'), '↩ 回到 Σ·观影位': () => setView('Σ眼') };
for (const k in viewBtns) vf.add(viewBtns, k);
vf.add(viewState, 'lift', 0, 30, 0.5).name('模型升高')
  .onChange(v => { // 拖动中: 模型实时移动 + Σ眼跟随(否则眼睛脱离Σ) + PT 暂回光栅(BVH 已失效, 静止旧图会误导)
    if (worldGroup) worldGroup.position.y = v;
    if (currentView === 'Σ眼') placeEyeCam();
    if (params.pathTrace) pt.invalidate();
  })
  .onFinishChange(() => pt.schedule());          // 松手才重建 BVH(世界矩阵变了, updateCamera 不够)
vf.add(viewState, 'eyeFovScale', 1, 1.8, 0.05).name('Σ眼视野放宽 ×').onChange(() => { // 轻量: 只改摆位不重建
  if (currentView !== 'Σ眼') return;
  placeEyeCam();
  pt.updateCameraNow();
});
// ── 三视口(作者新规则: 主视口=当前视图, PT 只在主视口渲染, 副视口光栅实时, 不再互斥) ─────────
const multiCtrl = vf.add(viewState, 'multi').name('三视口 (主视口+顶+正)').onChange(v => {
  if (v) { controls.enabled = true; mv.frameViewports(); }       // 主视口保持当前视图(Σ眼也行), 不再强制切透视
  else mv.exit();
});
// PT 开关(唯一处理器): 停自动展开(互斥: 每帧全量 BVH 会冻死) + 脚手架抑制 + 重建
ctrls.pathTrace?.onChange(v => {
  if (v) {
    if (params.autoPlay) { params.autoPlay = false; ctrls.autoPlay?.updateDisplay(); }
    if (params.figureWalk && !params.ptDynamic) { // 非动态模式: 开PT=定格停走(各自留位)
      params.figureWalk = false; ctrls.figureWalk?.updateDisplay();
      for (const h of walkHandles) if (h.last) placed['figure-' + h.gap] = { ...h.last };
    }
    suppressScaffold();
  }
  rebuild();
});
// 预设存档/载入: 当前参数+视角 → JSON 文件下载 / 从文件读回套用 (src/app/presets.js)
setupPresets(gui, { params, viewState, getCamera, controls, rebuild, applyEnv, setView, getView: () => currentView });
// resize 补课(审查发现的三个落空点): ① PT 投影是 setCamera 时的快照, resize 不自更新 → 持续拉伸;
// ② PT 收敛停采后 resize 清空画布且三个渲染分支都不再画 → 永久黑屏(updateCamera 会 reset 续累积, 一并治);
// ③ 三视口的顶/正两台正交相机视锥只在 frameViewports 设置 → resize 后保持旧宽高比变形(只校宽高比, 保留用户缩放)。
// 用微任务延后, 确保 scene.js 的 resize(相机 aspect/renderer 尺寸)先完成。
function onAppResize() {
  queueMicrotask(() => {
    pt.updateCameraIfReady();
    if (viewState.multi) mv.onResize();
  });
}
new ResizeObserver(onAppResize).observe(document.body); // 唯一 resize 通道(body height:100% 跟随视口, 含加载竞态); 不再叠 window resize 双触发

// 默认视角: 桌面=Σ·观影位(PT 默认开 → 落地即影院视角看合成反射画面);
// 移动端=透视总览(无 PT, Σ眼望远会变成贴脸特写; 总览能看清整座镜面结构, 是更好的手机首屏)
setView(isMobile ? '透视' : 'Σ眼');

// ---- 主循环 ------------------------------------------------------------------
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();                 // 帧间隔(行走匀速用); elapsedTime 同步累计
  if (params.autoPlay) {
    params.expand = Math.sin(clock.elapsedTime * 0.6) * 0.5 + 0.5;
    expandCtrl.updateDisplay(); rebuild();
  }
  if (params.figureWalk && walkHandles.length) { // 行走: 每层一人各走各的环线(逐帧移动, 不重建), 脚贴各自地形
    const step = ((params.walkSpeed ?? 60) / U) * dt;            // 本帧走过的场景距离
    for (const h of walkHandles) {
      const { point, perimeter } = loopPoint(h.meta, h.t);
      h.t = (h.t + step / Math.max(1e-6, perimeter)) % 1;        // 同速 → 深层圈大走得久(物理一致)
      walkPhase[h.gap] = h.t;
      if (h.last) {                                              // 朝向: 顺位移方向(平滑转, 防低速抖动)
        const dx = point.x - h.last.x, dz = point.z - h.last.z;
        if (dx * dx + dz * dz > 1e-10) {
          const tgt = Math.atan2(dx, dz), cur = h.yaw ?? tgt;   // 人形默认朝 +Z(髋绕X摆=前后在Z) → yaw=atan2(dx,dz)
          let d = tgt - cur; d = Math.atan2(Math.sin(d), Math.cos(d));
          h.yaw = cur + d * Math.min(1, 12 * dt);
          h.obj.userData.setHeading?.(h.yaw);
          walkYaw[h.gap] = h.yaw;                              // 持久化朝向 → 停走重建后复原
        }
      }
      const stride = h.obj.userData.strideLen || 50;            // 步态相位 = 累计走过距离 / 步幅(初相按层错开)
      h.gaitPhase = (h.gaitPhase ?? h.gap * 0.3) + step / stride;
      h.obj.userData.gait?.(h.gaitPhase);
      h.obj.position.set(point.x, point.y, point.z);
      h.last = { x: point.x, y: point.y, z: point.z };
    }
    pt.dynamicWalkFrame(); // 动态PT: 拓扑不变 → bvh.refit 快路径, 每帧1采样=活的噪点画面(细节见 ptScheduler.js)
  }
  controls.autoRotate = params.autoRotate;
  controls.update();
  editor.frame();                              // 手柄跟当前视图相机 + 开关状态(关编辑/进三视口收手柄)
  if (viewState.multi) mv.render(pt.intoRect); // 三视口优先: 主视口 PT(经钩子)/光栅, 副视口永远光栅实时
  else if (pt.renderFullFrame()) { /* 单视口路径追踪: 渐进累积到上限后停(省 GPU); 相机变动由 'change' 重置续跑 */ }
  else { renderer.setViewport(0, 0, innerWidth, innerHeight); renderer.render(scene, getCamera()); }
}
animate();
</script>
</body>
</html>
